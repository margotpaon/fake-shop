apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fake-shop
  template:
    metadata:
      labels:
        app: fake-shop
    spec:
      containers:
      - name: fake-shop
        image: your-docker-image # Substitua pela sua imagem do Docker
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: fake-shop
spec:
  selector:
    app: fake-shop
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
